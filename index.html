<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My E-Commerce Store</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
    header { background: #333; color: #fff; padding: 1.5rem 0; text-align: center; }
    .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
    .products { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    .product { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 250px; text-align: center; }
    .product h3 { margin-top: 0; }
    .price { font-size: 1.2rem; color: #e44d26; font-weight: bold; }
    .btn { background: #28a745; color: #fff; padding: 10px 15px; text-decoration: none; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; width: 100%; margin-top: 10px;}
    .btn:hover { background: #218838; }
    footer { text-align: center; padding: 20px; background: #333; color: #fff; margin-top: 40px; }
  </style>
  <script>
    // PageView ইভেন্ট পাঠানোর জন্য স্ক্রিপ্ট
    (function() {
      const capi_url = "https://still-stream-48626-bb0ac4cda957.herokuapp.com/api/v1/events";
      const api_key = "bbVXXOsm7_I-q0jRbWnISLAACP3TlUJHvUbQhvzVsBw";

      fetch(capi_url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-API-Key': api_key
        },
        body: JSON.stringify({
          "data": [{
            "event_name": "PageView",
            "event_time": Math.floor(Date.now() / 1000),
            "event_id": "pv_" + Date.now(), // Deduplication ID
            "event_source_url": window.location.href,
            "user_data": {
              "client_ip_address": "8.8.8.8", // ইউজার আইপি
              "client_user_agent": navigator.userAgent
            }
          }]
        })
      })
      .then(response => response.json())
      .then(data => console.log('CAPI Status:', data))
      .catch(error => console.error('CAPI Error:', error));
    })();
  </script>
</head>

  </header>
  
  <div class="container">

        <h3>Stylish T-Shirt</h3>

      </div>
      <div class="product">

    </div>
  </div>

  <footer>
    <p>&copy; 2026 My E-Commerce Store</p>
